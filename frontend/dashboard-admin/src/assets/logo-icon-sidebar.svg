<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <defs>
    <filter id="neon" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Speed lines -->
  <line x1="1"  y1="13" x2="28" y2="13" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>
  <line x1="0"  y1="26" x2="29" y2="26" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" filter="url(#soft)" opacity="0.9"/>
  <line x1="2"  y1="39" x2="27" y2="39" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>

  <!-- C arc glow -->
  <path d="M 48 5 C 32 5 20 13 19 26 C 18 39 27 47 44 48"
    stroke="#00e676" stroke-width="8" fill="none" stroke-linecap="round"
    filter="url(#neon)" opacity="0.3"/>
  <!-- C arc main -->
  <path d="M 48 5 C 32 5 20 13 19 26 C 18 39 27 47 44 48"
    stroke="#00e676" stroke-width="4" fill="none" stroke-linecap="round"
    filter="url(#soft)"/>
</svg>
