<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 64">
  <defs>
    <filter id="neon" x="-60%" y="-120%" width="220%" height="340%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.05"/>
      <stop offset="55%" stop-color="#00e676" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffaa" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00ffaa" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#00ffcc" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#00ffaa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Speed lines (3 horizontal, extending left from C opening) -->
  <line x1="2"  y1="16" x2="38" y2="16" stroke="url(#lineGrad)" stroke-width="2"   stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>
  <line x1="0"  y1="32" x2="40" y2="32" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#soft)" opacity="0.90"/>
  <line x1="3"  y1="48" x2="37" y2="48" stroke="url(#lineGrad)" stroke-width="2"   stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>

  <!-- C arc — glow halo -->
  <path d="M 65 5 C 42 5 28 16 26 32 C 24 48 36 59 60 60"
    stroke="#00e676" stroke-width="11" fill="none" stroke-linecap="round"
    filter="url(#neon)" opacity="0.28"/>
  <!-- C arc — main -->
  <path d="M 65 5 C 42 5 28 16 26 32 C 24 48 36 59 60 60"
    stroke="#00e676" stroke-width="5" fill="none" stroke-linecap="round"
    filter="url(#soft)"/>

  <!-- "LeadCapture" white -->
  <text x="78" y="44"
    font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
    font-size="32" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">LeadCapture</text>

  <!-- "Pro" teal -->
  <text x="280" y="44"
    font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
    font-size="32" font-weight="800" fill="#00e676"
    filter="url(#soft)">Pro</text>

  <!-- Bottom accent glow line -->
  <line x1="0" y1="61" x2="380" y2="61" stroke="url(#bottomLine)" stroke-width="1.5"/>
</svg>
